---
- name: Configurar servidores Docker
  hosts: docker
  gather_facts: true

  tasks:
    - name: Mostrar el nombre del host
      ansible.builtin.debug:
        msg: "Servidor: {{ inventory_hostname }} (hostname: {{ ansible_hostname }})"

    - name: Mostrar el sistema operativo
      ansible.builtin.debug:
        msg: "Sistema operativo: {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Crear el directorio principal
      ansible.builtin.file:
        path: /tmp/ansible-demo
        state: directory
        mode: '0755'

    - name: Crear el archivo de informacion
      ansible.builtin.copy:
        dest: /tmp/ansible-demo/info.txt
        content: |
          Servidor: {{ inventory_hostname }}
          Sistema operativo: {{ ansible_distribution }} {{ ansible_distribution_version }}
        mode: '0644'

    - name: Crear directorios de trabajo
      ansible.builtin.file:
        path: "/tmp/ansible-demo/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - logs
        - backup
        - config

    - name: Mostrar mensaje para Ubuntu
      ansible.builtin.debug:
        msg: "Este servidor ejecuta Ubuntu."
      when: ansible_distribution == 'Ubuntu'

